services:
  - type: web
    name: wine-predict-classifier
    runtime: docker
    dockerfilePath: ./Dockerfile

    # Environment variables — disponíveis em RUNTIME
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: DAGSHUB_USERNAME
        sync: false
      - key: DAGSHUB_REPO_NAME
        sync: false
      - key: DAGSHUB_TOKEN
        sync: false
      - key: ENVIRONMENT
        value: production

    healthCheckPath: /_stcore/health
    healthCheckInterval: 30

    repo: https://github.com/frpbotero/wine_quality
    branch: master
    autoDeploy: true
